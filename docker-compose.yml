version: "3.8"

services:
  db:
    image: postgres:17-alpine
    pull_policy: if_not_present
    container_name: smart-news-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smart_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./fastAPI
    container_name: smart-news-backend
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_news
      - USE_API=TRUE
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./fastAPI:/app

  frontend:
    build: ./frontend
    container_name: smart-news-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend

  # cron-job:
  #   build: ./fastAPI
  #   container_name: smart-news-cron
  #   command: python cron_runner.py
  #   environment:
  #     - BACKEND_URL=http://backend:8000
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
